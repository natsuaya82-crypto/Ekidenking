    * {

      box-sizing: border-box;

    button, a {

    /* アプリルート: ゲーム風オーバーライド */

      background: var(--game-bg) !important;

    }
    .ekiden-app header {
      background: linear-gradient(180deg, var(--game-surface) 0%, transparent 100%) !important;

      padding: 12px 16px 14px !important;
      padding-top: max(12px, env(safe-area-inset-top)) !important;
    }
    .ekiden-app main {
      padding-bottom: calc(88px + var(--safe-bottom)) !important;
    }
    /* 下部ナビ: ゲーム風ピル型 */
    .ekiden-app nav {
      background: var(--game-surface) !important;
      border-top: 1px solid var(--game-border) !important;
      padding: 8px 8px calc(8px + var(--safe-bottom)) !important;
      min-height: var(--game-nav-height) !important;
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
    }
    .ekiden-app nav button {
      border-radius: var(--radius-btn) !important;
      padding: 10px 8px !important;
      transition: transform 0.15s ease, background 0.2s ease !important;
    }
    .ekiden-app nav button:active {
      transform: scale(0.96) !important;
    }
    /* カード・ボタン: ガラス風 */
    .ekiden-app .rounded-xl,
    .ekiden-app [class*="rounded-xl"] {
      border-radius: var(--radius-card) !important;
      box-shadow: var(--shadow-card) !important;
    }
    .ekiden-app button:not(nav button)[class*="gradient"] {
      border-radius: var(--radius-card) !important;
      box-shadow: var(--shadow-card) !important;
      transition: transform 0.15s ease, box-shadow 0.2s ease !important;
    }
    .ekiden-app button:not(nav button)[class*="gradient"]:active {
      transform: scale(0.98) !important;
    }

      background: linear-gradient(180deg, #0d0c14 0%, #0a0912 50%, #060508 100%) !important;
    }
    .ekiden-app.ekiden-title h1 {
      text-shadow: 0 0 40px rgba(0, 212, 170, 0.2);

      0% { transform: translateY(-30px); opacity: 0.5; }

    const calculateScoutProbability = (student, teamPerformance) => {
      const avgRank = (teamPerformance.izumo + teamPerformance.zennihon + teamPerformance.hakone) / 3;
      
      let performanceFactor;
      if (avgRank <= 1) performanceFactor = 1.0;
      else if (avgRank <= 6) performanceFactor = 0.5 + (6 - avgRank) * 0.1;
      else performanceFactor = Math.max(0.1, 0.5 - (avgRank - 6) * 0.05);
      
      let baseProb = { min: 0, max: 0 };
      if (student.rank === "稀代の天才") baseProb = { min: 0, max: 10 };
      else if (student.rank === "S") baseProb = { min: 10, max: 30 };
      else if (student.rank === "A") baseProb = { min: 30, max: 65 };
      else if (student.rank === "B") baseProb = { min: 65, max: 90 };
      else baseProb = { min: 90, max: 100 };
      
      const adjustedMin = baseProb.min * performanceFactor;
      const adjustedMax = baseProb.min + (baseProb.max - baseProb.min) * performanceFactor;
      
      const contactBonus = [0, 15, 25, 32, 37, 40][student.contactCount] || 40;
      const competitorPenalty = student.competitors * 2;
      
      const finalProb = Math.max(0, Math.min(100, 
        (adjustedMin + adjustedMax) / 2 + contactBonus - competitorPenalty
      ));
      
      return Math.round(finalProb);
    };

      // 箱根予選会専用のハーフタイム計算（ロードスター・駅伝男ボーナスあり、記録には残らない）
      const calculateYosenHalfTime = (player, weather, temperature) => {
        const mnt = player.stats.mnt;
        // 🆕 1. 基礎タイム計算（トップで10:50:00台になるように調整）
        // 10人平均で約65分（3900秒）にする
        let baseTime;
        if (mnt >= 80) {
          baseTime = 3900 - (mnt - 80) * 7.5; // 能力80で65分、100で62分
        } else {
          baseTime = 3900 + (80 - mnt) * 10; // 能力低いと遅くなる
        }
        
        // 2. コンディション補正
        let effectiveCondition = player.condition;
        if (player.skill1 === "平常心" || player.skill2 === "平常心") {
          effectiveCondition = Math.min(5, effectiveCondition + 1);
        }
        const conditionBonus = { 5: -60, 4: -30, 3: 0, 2: 30, 1: 60 }[effectiveCondition] || 0;
        const fatigueBonus = [-60, -30, 0, 30, 60, 90, 120, 150, 180, 210, 240][player.fatigue] || 0;
        
        // 3. 環境補正
        const weatherBonus = { "晴れ": 0, "曇り": 30, "小雨": 60, "大雨": 120, "雪": 90 }[weather] || 0;
        const tempBonus = { "適温": -15, "肌寒い": 0, "極寒": 60, "真夏日": 60, "猛暑": 90 }[temperature] || 0;
        
        // 4. 予選会専用スキルボーナス
        let skillBonus = 0;
        if (player.skill1 === "ロードスター" || player.skill2 === "ロードスター") {
          skillBonus -= 40; // ロードスター: -40秒
        }
        if (player.skill1 === "駅伝男" || player.skill2 === "駅伝男") {
          skillBonus -= 35; // 駅伝男: -35秒
        }
        
        // 最終タイム（秒で返す）
        const finalTime = baseTime + conditionBonus + fatigueBonus + weatherBonus + tempBonus + skillBonus;
        return Math.floor(finalTime);
      };
      
      // --- レースシミュレーション関数 ---
      const simulateRace = (allRunners, distance, weather, temperature) => {
        const runners = allRunners.map(r => {
          const baseTime = distance === 5000 ? (841 - (r.player.stats.spd - 80) * 2.0) :
            distance === 10000 ? (1736 - (r.player.stats.sta - 80) * 3.58) :
            (3823.5 - (r.player.stats.mnt - 80) * 9.1);
          return { ...r, totalTime: 0, pacePattern: getPacePattern(r.player), baseTime, fatigueLevel: 0, events: [] };
        });
        for (let phase = 0; phase < 4; phase++) {
          runners.forEach(r => {
            const pace = PACE_PATTERNS[r.pacePattern][phase];
            let phaseTime = (r.baseTime / 4) * pace + (r.fatigueLevel * 2);
            r.fatigueLevel += (pace - 1.0) * (1 - r.player.stats.sta / 100) * 3;
            r.fatigueLevel = Math.max(0, r.fatigueLevel);
            r.totalTime += phaseTime;
          });
          runners.sort((a, b) => a.totalTime - b.totalTime);
          for (let i = 0; i < runners.length - 1; i++) {
            if (runners[i + 1].totalTime - runners[i].totalTime <= 5) {
              let bonus1 = (i === 0 && (runners[i].player.skill1 === "単独走" || runners[i].player.skill2 === "単独走")) ? 2 : 0;
              let bonus2 = (i >= 3 && (runners[i + 1].player.skill1 === "集団走" || runners[i + 1].player.skill2 === "集団走")) ? 2 : 0;
              const power1 = runners[i].player.stats.mnt + runners[i].player.condition * 2 + bonus1;
              const power2 = runners[i + 1].player.stats.mnt + runners[i + 1].player.condition * 2 + bonus2;
              if (power2 > power1 + 5) {
                runners[i + 1].totalTime -= 1;
                runners[i + 1].events.push(`P${phase + 1}: 追い上げ！`);
              }
            }
          }
        }
        runners.sort((a, b) => a.totalTime - b.totalTime);
        return runners.map(r => ({ ...r, time: `${Math.floor(r.totalTime / 60)}:${Math.floor(r.totalTime % 60).toString().padStart(2, '0')}` }));
      };
      // --- イベント実行 ---

          return min * 60 + sec;

                      // 貪欲法+2-opt改善で合計適性を最大化

                              const zennihonBase3 = rivalUniversities.slice(0, zennihonCount3);

                                            <p>10k: {p.records?.["10000m"] || "--:--"}</p>
                                            <p>速{Math.round(p.stats.spd)} 体{Math.round(p.stats.sta)} 心{Math.round(p.stats.mnt)}</p>
                                            <p className={p.fatigue >= 7 ? 'text-red-400' : p.fatigue >= 4 ? 'text-orange-400' : 'text-green-400'}>
                                              疲労{p.fatigue} {getConditionText(p.condition)}
                                            </p>
                                          </div>
                                        </div>
                                      ) : (
                                        <button
                                          onClick={() => setZennihonSelectingSlot(isSelecting ? null : absIdx)}
                                          className={`w-full border-dashed border rounded-lg p-2 text-center text-xs transition-all ${
                                            isSelecting 
                                              ? 'bg-yellow-900/30 border-yellow-500 text-yellow-300' 
                                              : 'bg-slate-700/30 border-slate-600 text-slate-500 hover:border-blue-500 hover:text-blue-400'
                                          }`}
                                        >
                                          {isSelecting ? '▼ 選手を選択' : '未選択\nタップで選択'}
                                        </button>
                                      )}
                                    </div>
                                  );
                                })}
                              </div>
                              {/* このグループのスロットが選択中の場合、インライン選手一覧を表示 */}
                              {(zennihonSelectingSlot === groupIdx*2 || zennihonSelectingSlot === groupIdx*2+1) && (
                                <div className="mt-2 border-t border-yellow-500/30 pt-2">
                                  <p className="text-[9px] text-yellow-300 font-black mb-1">
                                    スロット{(zennihonSelectingSlot % 2) + 1}に配置する選手を選択
                                  </p>
                                  <div className="space-y-1 max-h-36 overflow-y-auto">
                                    {players.filter(p => !p.isInjured).filter((p, i, self) => i === self.findIndex(q => q.id === p.id)).sort((a,b) => {
                                      const ta = a.records?.["10000m"] ? timeToSeconds(a.records["10000m"]) : 9999;
                                      const tb = b.records?.["10000m"] ? timeToSeconds(b.records["10000m"]) : 9999;
                                      return ta - tb;
                                    }).map(p => {
                                      const alreadyAssigned = zennihonYosenRunners.some((r, i) => r === p.id && i !== zennihonSelectingSlot);
                                      return (
                                        <button key={p.id}
                                          disabled={alreadyAssigned}
                                          onClick={() => {
                                            if (alreadyAssigned) return;
                                            const updated = [...zennihonYosenRunners];
                                            // 既に別スロットにいる場合は解除
                                            const prev = updated.findIndex(r => r === p.id);
                                            if (prev !== -1) updated[prev] = undefined;
                                            updated[zennihonSelectingSlot] = p.id;
                                            setZennihonYosenRunners(updated);
                                            setZennihonSelectingSlot(null);
                                          }}
                                          className={`w-full text-left px-2 py-1.5 rounded text-[10px] flex items-center justify-between transition-all ${
                                            alreadyAssigned ? 'opacity-40 cursor-not-allowed bg-slate-800/30 border border-slate-700' : 'bg-slate-800 border border-slate-600 hover:border-yellow-500/60 hover:bg-yellow-900/20'
                                          }`}
                                        >
                                          <div className="flex items-center gap-2">
                                            <span className="font-bold text-white">{p.name}</span>
                                            <span className="text-slate-400">{p.grade}年</span>
                                            {alreadyAssigned && <span className="text-[8px] text-blue-400 font-black">配置済</span>}
                                          </div>
                                          <div className="flex gap-2 text-[9px] text-slate-400">
                                            <span className="font-mono text-cyan-300">{p.records?.["10000m"] || "--:--"}</span>
                                            <span className={p.fatigue >= 7 ? 'text-red-400' : 'text-slate-500'}>疲{p.fatigue}</span>
                                          </div>
                                        </button>
                                      );
                                    })}
                                  </div>
                                </div>
                              )}
                            </div>
                          );
                        })}
                      </div>

                      {/* 選手一覧（下部からも選択可能） */}
                      <p className="text-xs font-black text-slate-400 mb-2">選手を選択（タップで組に追加 / もう一度タップで解除）</p>
                      <div className="space-y-1 max-h-48 overflow-y-auto">
                        {players.filter(p => !p.isInjured).filter((p, index, self) =>
                          index === self.findIndex(q => q.id === p.id)
                        ).sort((a,b) => {
                          const ta = a.records?.["10000m"] ? timeToSeconds(a.records["10000m"]) : 9999;
                          const tb = b.records?.["10000m"] ? timeToSeconds(b.records["10000m"]) : 9999;
                          return ta - tb;
                        }).map(p => {
                          const assignedIdx = zennihonYosenRunners.findIndex(r => r === p.id);
                          const isAssigned = assignedIdx !== -1;
                          const groupNum = isAssigned ? Math.floor(assignedIdx / 2) + 1 : null;
                          const slotNum  = isAssigned ? (assignedIdx % 2) + 1 : null;
                          return (
                            <button key={p.id}
                              onClick={() => {
                                if (isAssigned) {
                                  // 解除
                                  const updated = [...zennihonYosenRunners];
                                  updated[assignedIdx] = undefined;
                                  setZennihonYosenRunners(updated);
                                  return;
                                }
                                // 空きスロットに追加（重複チェック込み）
                                const currentCount = zennihonYosenRunners.filter(r => r !== undefined && r !== null).length;
                                if (currentCount >= 8) return;
                                const nextEmpty = [0,1,2,3,4,5,6,7].find(i =>
                                  zennihonYosenRunners[i] === undefined || zennihonYosenRunners[i] === null
                                );
                                if (nextEmpty === undefined) return;
                                // 同一選手が既に入っていないか確認
                                if (zennihonYosenRunners.includes(p.id)) return;
                                const updated = [...zennihonYosenRunners];
                                updated[nextEmpty] = p.id;
                                setZennihonYosenRunners(updated);
                              }}
                              className={`w-full text-left px-3 py-2 rounded-lg text-xs transition-all flex items-center justify-between ${
                                isAssigned ? 'bg-blue-900/40 border border-blue-500/50' : 'bg-slate-800/50 border border-slate-700 hover:border-blue-500/50'
                              }`}
                            >
                              <div className="flex items-center gap-2">
                                {isAssigned && <span className="text-[9px] px-1.5 py-0.5 bg-blue-600 text-white rounded font-black">第{groupNum}組{slotNum}</span>}
                                <span className="font-bold text-white">{p.name}</span>
                                <span className="text-slate-400">{p.grade}年</span>
                              </div>
                              <div className="flex items-center gap-2 text-[9px]">
                                <span className={`font-mono font-black ${p.records?.["10000m"] ? 'text-cyan-300' : 'text-slate-600'}`}>
                                  10k: {p.records?.["10000m"] || "--:--"}
                                </span>
                                <span className="text-slate-500">疲{p.fatigue}</span>
                              </div>
                            </button>
                          );
                        })}
                      </div>
                    </div>
                    <div className="p-4 border-t border-blue-500/20 shrink-0 space-y-2">
                      {/* おまかせ */}
                      <button onClick={() => {
                        const sorted = players.filter(p => !p.isInjured).sort((a,b) => {
                          const sa = a.stats.spd*0.3+a.stats.sta*0.5+a.stats.mnt*0.2;
                          const sb = b.stats.spd*0.3+b.stats.sta*0.5+b.stats.mnt*0.2;
                          return sb - sa;
                        });
                        const top8 = sorted.slice(0, 8).map(p => p.id);
                        setZennihonYosenRunners(top8);
                      }} className="w-full py-2 rounded-lg font-black text-sm bg-emerald-700/50 text-emerald-200 hover:bg-emerald-700/70 transition-all">
                        ⚡ おまかせ（上位8人を自動配置）
                      </button>
                      <div className="flex gap-2">
                        <button onClick={() => {
                          setShowZennihonYosenModal(false);
                          setCanEnterZennihon(false);
                          setWeek(week + 1);
                        }} className="flex-1 py-3 rounded-xl font-black bg-slate-700 text-slate-300">棄権</button>
                        <button
                          onClick={() => {
                            const selected = zennihonYosenRunners.filter(r => r !== undefined && r !== null);
                            if (selected.length < 8) { alert('8人全員を配置してください！'); return; }
                            // 予選会を実行：各組ごとにタイム計算
                            const { weather, temperature } = getWeatherConditions(currentCalendar.month);
                            const allGroupResults = [];
                            // ライバル校の選手を各組に配置
                            const yosenRivals = yosenUnivs;
                            // 各組（4組）の結果を計算
                            const univTotals = {}; // 大学名 -> 合計秒数
                            // 自チーム
                            univTotals[universityName] = { total: 0, isMyTeam: true, runners: [] };
                            yosenRivals.forEach(u => { univTotals[u.name] = { total: 0, isMyTeam: false, runners: [] }; });
                            for (let g = 0; g < 4; g++) {
                              const myP1 = players.find(p => p.id === selected[g*2]);
                              const myP2 = players.find(p => p.id === selected[g*2+1]);
                              const groupEntries = [];
                              // 自チーム2人
                              [myP1, myP2].forEach(p => {
                                if (!p) return;
                                const time = calculate10000mTime(p, weather, temperature);
                                const parts = time.split(':').map(Number);
                                const secs = parts[0]*60+parts[1];
                                groupEntries.push({ player: p, university: universityName, time, timeInSeconds: secs, isMyTeam: true });
                                univTotals[universityName].total += secs;
                                univTotals[universityName].runners.push({ name: p.name, time, secs });
                              });
                              // 各ライバル校2人
                              yosenRivals.forEach(univ => {
                                const sorted = [...univ.players].filter(p=>!p.isInjured).sort((a,b)=>{
                                  const sa=a.stats.spd*0.3+a.stats.sta*0.5+a.stats.mnt*0.2;
                                  const sb=b.stats.spd*0.3+b.stats.sta*0.5+b.stats.mnt*0.2;
                                  return sb-sa;
                                });
                                const runners = sorted.slice(g*2, g*2+2);
                                runners.forEach(p => {
                                  const time = calculate10000mTime(p, weather, temperature);
                                  const parts = time.split(':').map(Number);
                                  const secs = parts[0]*60+parts[1];
                                  groupEntries.push({ player: p, university: univ.name, time, timeInSeconds: secs, isMyTeam: false });
                                  univTotals[univ.name].total += secs;
                                  univTotals[univ.name].runners.push({ name: p.name, time, secs });
                                });
                              });
                              groupEntries.sort((a,b) => a.timeInSeconds - b.timeInSeconds);
                              allGroupResults.push({ groupNum: g+1, entries: groupEntries });
                            }
                            // 総合順位
                            const finalRanking = Object.entries(univTotals)
                              .map(([name, data]) => ({
                                university: name,
                                totalSeconds: data.total,
                                isMyTeam: data.isMyTeam,
                                runners: data.runners,
                                qualified: false
                              }))
                              .sort((a,b) => a.totalSeconds - b.totalSeconds)
                              .map((r, idx) => ({ ...r, rank: idx+1, qualified: idx < 7 }));
                            setZennihonYosenGroupResults(allGroupResults);
                            setZennihonYosenFinalResults(finalRanking);
                            setZennihonYosenPhase('group1');
                          }}
                          className="flex-1 py-3 rounded-xl font-black bg-gradient-to-r from-blue-600 to-indigo-600 text-white hover:scale-105 transition-all"
                        >
                          🏁 予選会スタート！
                        </button>
                      </div>
                    </div>
                  </div>
                </div>
              );
            }

            // 組ごとの結果発表フェーズ
            const groupPhaseMap = { group1: 0, group2: 1, group3: 2, group4: 3 };
            const currentGroupIdx = groupPhaseMap[zennihonYosenPhase];
            if (currentGroupIdx !== undefined && zennihonYosenGroupResults[currentGroupIdx]) {
              const groupData = zennihonYosenGroupResults[currentGroupIdx];
              // ここまでの組の途中集計
              const interimTotals = {};
              for (let i = 0; i <= currentGroupIdx; i++) {
                zennihonYosenGroupResults[i].entries.forEach(e => {
                  if (!interimTotals[e.university]) interimTotals[e.university] = { total: 0, isMyTeam: e.isMyTeam };
                  interimTotals[e.university].total += e.timeInSeconds;
                });
              }
              const interimRanking = Object.entries(interimTotals)
                .map(([name, d]) => ({ university: name, total: d.total, isMyTeam: d.isMyTeam }))
                .sort((a,b) => a.total - b.total);
              const nextPhase = currentGroupIdx < 3 ? `group${currentGroupIdx+2}` : 'result';
              const nextLabel = currentGroupIdx < 3 ? `第${currentGroupIdx+2}組の結果へ` : '最終結果発表へ';
              return (
                <div className="fixed inset-0 bg-black/95 backdrop-blur-sm z-50 flex items-center justify-center p-4">
                  <div className="bg-gradient-to-br from-slate-900 to-slate-800 rounded-2xl w-full max-w-2xl max-h-[90vh] overflow-hidden border border-blue-500/30 flex flex-col">
                    <div className="bg-gradient-to-r from-blue-700 to-indigo-700 p-4 shrink-0">
                      <h2 className="text-xl font-black text-white">🏟️ 第{currentGroupIdx+1}組 結果</h2>
                      <p className="text-sm text-blue-100">10000m / {groupData.entries.length}人出走</p>
                    </div>
                    <div className="flex-1 overflow-y-auto p-4 space-y-4">
                      {/* 組の個人結果 */}
                      <div>
                        <p className="text-xs font-black text-slate-400 mb-2">個人結果（上位10人）</p>
                        <div className="space-y-1">
                          {(() => {
                            const top10 = groupData.entries.slice(0, 10);
                            const myEntries = groupData.entries.filter(e => e.isMyTeam);
                            // 自チームが上位10人に含まれていない場合、追加表示
                            const myNotInTop10 = myEntries.filter(me => !top10.find(e => e.player.id === me.player.id));
                            const displayEntries = [...top10];
                            // 自チームを末尾に追加（区切り線付き）
                            return (
                              <>
                                {top10.map((e, i) => (
                                  <div key={`t${i}`} className={`flex items-center justify-between p-2 rounded-lg text-xs ${e.isMyTeam ? 'bg-orange-900/30 border border-orange-500/40' : 'bg-slate-800/40'}`}>
                                    <div className="flex items-center gap-2">
                                      <span className={`font-black w-5 ${i===0?'text-yellow-400':i===1?'text-slate-300':i===2?'text-orange-400':'text-slate-500'}`}>{i+1}</span>
                                      <span className={`font-bold ${e.isMyTeam?'text-orange-300':'text-white'}`}>{e.player.name}</span>
                                      <span className="text-slate-500">{e.university}</span>
                                    </div>
                                    <span className="font-mono font-black text-cyan-300">{e.time}</span>
                                  </div>
                                ))}
                                {myNotInTop10.map(e => {
                                  const rank = groupData.entries.findIndex(ge => ge.player.id === e.player.id) + 1;
                                  return (
                                    <div key={`my${e.player.id}`}>
                                      <div className="border-t border-dashed border-slate-600 my-1 text-center">
                                        <span className="text-[8px] text-slate-500">…</span>
                                      </div>
                                      <div className="flex items-center justify-between p-2 rounded-lg text-xs bg-orange-900/30 border border-orange-500/40">
                                        <div className="flex items-center gap-2">
                                          <span className="font-black w-5 text-slate-400">{rank}</span>
                                          <span className="font-bold text-orange-300">{e.player.name}</span>
                                          <span className="text-slate-500">{e.university}</span>
                                        </div>
                                        <span className="font-mono font-black text-cyan-300">{e.time}</span>
                                      </div>
                                    </div>
                                  );
                                })}
                              </>
                            );
                          })()}
                        </div>
                      </div>
                      {/* 中間集計 */}
                      <div>
                        <p className="text-xs font-black text-slate-400 mb-2">📊 第{currentGroupIdx+1}組終了時点の順位</p>
                        <div className="space-y-1 max-h-48 overflow-y-auto">
                          {interimRanking.map((r, i) => {
                            const fmtTotal = `${Math.floor(r.total/60)}:${String(r.total%60).padStart(2,'0')}`;
                            return (
                              <div key={r.university} className={`flex items-center justify-between p-2 rounded text-xs ${r.isMyTeam?'bg-orange-900/30 border border-orange-500/40':i<7?'bg-green-900/20 border border-green-600/20':'bg-slate-800/30'}`}>
                                <div className="flex items-center gap-2">
                                  <span className={`font-black w-5 ${i===0?'text-yellow-400':i<7?'text-green-400':'text-slate-500'}`}>{i+1}</span>
                                  <span className={`font-bold ${r.isMyTeam?'text-orange-300':'text-white'}`}>{r.university}</span>
                                  {i < 7 && <span className="text-[8px] px-1 bg-green-600/30 text-green-300 rounded">通過圏</span>}
                                </div>
                                <span className="font-mono text-cyan-300">{fmtTotal}</span>
                              </div>
                            );
                          })}
                        </div>
                      </div>
                    </div>
                    <div className="p-4 border-t border-blue-500/20 shrink-0">
                      <button onClick={() => setZennihonYosenPhase(nextPhase)}
                        className="w-full py-3 rounded-xl font-black bg-gradient-to-r from-blue-600 to-indigo-600 text-white hover:scale-105 transition-all">
                        📢 {nextLabel}
                      </button>
                    </div>
                  </div>
                </div>
              );
            }

            // 最終結果フェーズ
            if (zennihonYosenPhase === 'result' && zennihonYosenFinalResults) {
              const myResult = zennihonYosenFinalResults.find(r => r.isMyTeam);
              const qualified = myResult?.qualified || false;
              const allRevealed = zennihonRevealCount >= zennihonYosenFinalResults.length;
              return (
                <div className="fixed inset-0 bg-black/95 backdrop-blur-sm z-50 flex items-center justify-center p-4">
                  <div className="bg-gradient-to-br from-slate-900 to-slate-800 rounded-2xl w-full max-w-2xl max-h-[90vh] overflow-hidden border border-blue-500/30 flex flex-col">
                    <div className="bg-gradient-to-r from-blue-700 to-indigo-700 p-4 shrink-0">
                      <h2 className="text-xl font-black text-white">🏆 最終結果発表</h2>
                      <p className="text-sm text-blue-100">上位7校が全日本大学駅伝 本戦出場</p>
                    </div>
                    {/* 自チームバナー（判明後） */}
                    {myResult && zennihonRevealCount >= myResult.rank && (
                      <div className={`mx-4 mt-3 px-4 py-3 rounded-xl shrink-0 ${qualified?'bg-gradient-to-r from-green-700 to-emerald-700':'bg-gradient-to-r from-red-700 to-rose-700'}`}>
                        <div className="flex items-center justify-between">
                          <div>
                            <p className="text-xs text-white/70">{universityName}</p>
                            <p className="text-2xl font-black text-white">{myResult.rank}位 {qualified?'✅ 本戦出場！':'❌ 落選'}</p>
                          </div>
                          <p className="text-lg font-mono font-black text-white">{Math.floor(myResult.totalSeconds/60)}:{String(myResult.totalSeconds%60).padStart(2,'0')}</p>
                        </div>
                      </div>
                    )}
                    <div className="flex-1 overflow-y-auto p-4">
                      <div className="space-y-1">
                        {zennihonYosenFinalResults.map((r, idx) => {
                          const revealed = zennihonRevealCount >= r.rank;
                          const gap = idx === 0 ? 0 : r.totalSeconds - zennihonYosenFinalResults[0].totalSeconds;
                          return (
                            <div key={r.rank}>
                              <div className={`flex items-center justify-between p-2.5 rounded-lg transition-all ${revealed&&r.isMyTeam?'bg-orange-600/30 border-2 border-orange-400':revealed&&r.qualified?'bg-green-900/30 border border-green-600/30':revealed?'bg-slate-700/30':'bg-slate-800/60'}`}>
                                <div className="flex items-center gap-3 flex-1">
                                  <span className={`text-sm font-black w-6 ${r.rank===1?'text-yellow-400':r.rank<=3?'text-orange-400':r.qualified?'text-green-400':'text-slate-500'}`}>{r.rank}</span>
                                  <span className={`text-sm font-bold flex-1 ${!revealed?'text-slate-600':r.isMyTeam?'text-orange-300':'text-white'}`}>{revealed ? r.university : '???'}</span>
                                  {revealed && r.qualified && <span className="text-[8px] px-1.5 py-0.5 bg-green-600/30 text-green-300 rounded font-bold">本戦</span>}
                                </div>
                                <div className="text-right shrink-0">
                                  <p className="text-sm font-mono font-black text-cyan-300">{Math.floor(r.totalSeconds/60)}:{String(r.totalSeconds%60).padStart(2,'0')}</p>
                                  {gap > 0 && <p className="text-[9px] text-slate-500">+{Math.floor(gap/60)}:{String(gap%60).padStart(2,'0')}</p>}
                                </div>
                              </div>
                              {r.rank === 7 && (
                                <div className="relative py-2">
                                  <div className="absolute inset-0 flex items-center"><div className="w-full border-t-2 border-dashed border-yellow-500/70"></div></div>
                                  <div className="relative flex justify-center"><span className="bg-slate-900 px-3 py-0.5 text-xs font-black text-yellow-400 border border-yellow-500/70 rounded-full">━ ボーダー ━</span></div>
                                </div>
                              )}
                            </div>
                          );
                        })}
                      </div>
                    </div>
                    <div className="p-4 border-t border-blue-500/20 shrink-0">
                      {!allRevealed ? (
                        <div className="flex gap-2">
                          <button onClick={() => setZennihonRevealCount(c => Math.min(c+1, zennihonYosenFinalResults.length))}
                            className="flex-1 py-3 rounded-xl font-black bg-gradient-to-r from-blue-600 to-indigo-600 text-white hover:scale-105 transition-all">
                            📢 次を発表（{zennihonRevealCount+1}位）
                          </button>
                          <button onClick={() => setZennihonRevealCount(zennihonYosenFinalResults.length)}
                            className="py-3 px-4 rounded-xl font-black bg-slate-700 text-slate-300 text-sm">全て表示</button>
                        </div>
                      ) : (
                        <button onClick={() => {
                          const q = myResult?.qualified || false;
                          // 【評判変動】全日本予選落ち: -8
                          if (!q) {
                            setReputation(prev => Math.max(0, prev - 8));
                          }
                          setCanEnterZennihon(q);
                          setHasZennihonSeed(false);
                          setShowZennihonYosenModal(false);
                          setWeek(week + 1);
                        }} className="w-full py-4 rounded-xl font-black text-lg bg-gradient-to-r from-blue-600 to-purple-600 text-white hover:scale-105 transition-all">
                          次へ進む
                        </button>
                      )}
                    </div>
                  </div>
                </div>
              );
            }
            return null;
          })()}

          {/* 箱根予選会モーダル */}
          {showHakoneYosenModal && !hakoneYosenResults && (
            <div className="fixed inset-0 bg-black/95 backdrop-blur-sm z-50 flex items-center justify-center p-4">

                          univResult.playerTimes.forEach(({ player, seconds }) => {

                              player,
                              time: seconds,
                              university: univResult.university,
                              isMyTeam: false
                            });
                          });
                        });

                            gakurenTeam.push(candidate);
                            selectedUniversities.add(candidate.university);
                          }

                          gakurenTeam,
                          myGakurenPlayers // 🆕 自大学から選ばれた選手
                        });
                        
                        // 🆕 学連選抜を状態に保存
                        setGakurenTeam(gakurenTeam);
                        
                        // 注意: 予選会の記録は個人記録（PB）には反映しない
                      }}

                          // レース実行

                          // 自大学の選手
                          const myResults = selectedRunners.map(playerId => {
                            const player = players.find(p => p.id === playerId);
                            let time;
                            // 種目に応じた計算式を使用
                            if (trackRaceEvent.type === "5000m") {
                              time = calculate5000mTime(player, weather, temperature);
                            } else if (trackRaceEvent.type === "10000m" || trackRaceEvent.type === "チーム内10km") {
                              time = calculate10000mTime(player, weather, temperature);
                            } else if (trackRaceEvent.type === "ハーフ") {

                            } else if (trackRaceEvent.type === "マラソン") {
                              // マラソンはハーフの約2.1倍（後半の失速を考慮）
                              const halfTime = calculateHalfTime(player, weather, temperature);
                              // ハーフタイムを秒に変換（時:分:秒 or 分:秒対応）
                              const halfParts = halfTime.split(':').map(Number);

                                halfSeconds = halfParts[0] * 60 + halfParts[1];

                              const marathonSeconds = Math.floor(halfSeconds * 2.1); // 2.1倍
                              const marathonHours = Math.floor(marathonSeconds / 3600);

                              const marathonSec = marathonSeconds % 60;

                            // タイムを秒に変換（時:分:秒 or 分:秒の両方に対応）

                              timeInSeconds = timeParts[0] * 3600 + timeParts[1] * 60 + timeParts[2];
                            } else {
                              // 分:秒
                              timeInSeconds = timeParts[0] * 60 + timeParts[1];
                            }
                            return { player, time, timeInSeconds, university: universityName, isMyTeam: true };
                          });
                          // 他大学の選手（各大学10人）- チーム内レースの場合は除く
                          const rivalResults = [];
                          if (!trackRaceEvent.teamOnly) {
                            rivalUniversities.forEach(univ => {
                              // 上位3人 + ランダム7人を選出
                              const sortedPlayers = [...univ.players]
                                .filter(p => !p.isInjured)
                                .sort((a, b) => {
                                  const avgA = (a.stats.spd + a.stats.sta + a.stats.mnt) / 3;
                                  const avgB = (b.stats.spd + b.stats.sta + b.stats.mnt) / 3;
                                  return avgB - avgA;
                                });
                              const top3 = sortedPlayers.slice(0, 3);
                              const others = sortedPlayers.slice(3);
                              const random7 = [];
                              while (random7.length < 7 && others.length > 0) {
                                const idx = Math.floor(Math.random() * others.length);
                                random7.push(others.splice(idx, 1)[0]);

                              const selectedRivals = [...top3, ...random7];
                              selectedRivals.forEach(player => {
                                // ライバルに疑似的な調子(1-5)・疲労(0-6)をランダム付与してタイムに変動をつける
                                const rivalCondition = Math.floor(Math.random() * 5) + 1; // 1〜5
                                const rivalFatigue = Math.floor(Math.random() * 7);       // 0〜6
                                const rivalWithCondition = { ...player, condition: rivalCondition, fatigue: rivalFatigue };
                                let time;
                                if (trackRaceEvent.type === "5000m") {
                                  time = calculate5000mTime(rivalWithCondition, weather, temperature);
                                } else if (trackRaceEvent.type === "10000m" || trackRaceEvent.type === "チーム内10km") {
                                  time = calculate10000mTime(rivalWithCondition, weather, temperature);
                                } else if (trackRaceEvent.type === "ハーフ") {
                                  time = calculateHalfTime(rivalWithCondition, weather, temperature);
                                } else if (trackRaceEvent.type === "マラソン") {

                                  const halfTime = calculateHalfTime(rivalWithCondition, weather, temperature);
                                  // ハーフタイムを秒に変換（時:分:秒 or 分:秒対応）
                                  const halfParts = halfTime.split(':').map(Number);
                                  let halfSeconds;
                                  if (halfParts.length === 3) {
                                    halfSeconds = halfParts[0] * 3600 + halfParts[1] * 60 + halfParts[2];
                                  } else {
                                    halfSeconds = halfParts[0] * 60 + halfParts[1];
                                  }
                                  const marathonSeconds = Math.floor(halfSeconds * 2.1);
                                  const marathonHours = Math.floor(marathonSeconds / 3600);
                                  const marathonMin = Math.floor((marathonSeconds % 3600) / 60);
                                  const marathonSec = marathonSeconds % 60;
                                  time = `${marathonHours}:${marathonMin.toString().padStart(2, '0')}:${marathonSec.toString().padStart(2, '0')}`;
                                }
                                // タイムを秒に変換（時:分:秒 or 分:秒の両方に対応）
                                const timeParts = time.split(':').map(Number);
                                let timeInSeconds;
                                if (timeParts.length === 3) {
                                  // 時:分:秒
                                  timeInSeconds = timeParts[0] * 3600 + timeParts[1] * 60 + timeParts[2];
                                } else {
                                  // 分:秒
                                  timeInSeconds = timeParts[0] * 60 + timeParts[1];
                                }
                                rivalResults.push({ 
                                  player, 
                                  time, 
                                  timeInSeconds, 
                                  university: univ.name, 
                                  isMyTeam: false 
                                });
                              });
                            });
                          }
                          // 実業団選手を混入（大阪マラソン・丸亀ハーフ・八王子LDのみ）
                          const proRaceTypes = { "マラソン": "大阪マラソン", "ハーフ": "丸亀ハーフ", "10000m": "八王子ロングディスタンス" };
                          const proRaceKey = proRaceTypes[trackRaceEvent.type];
                          const proResults = [];

                            const activeProAthletes = proAthletes.filter(p => !p.isRetired);
                            activeProAthletes.forEach(athlete => {
                              // 参加率チェック
                              const rate = PRO_RACES[proRaceKey]?.participationRate?.[athlete.proTeam?.tier] ?? 0.5;
                              if (Math.random() > rate) return;
                              // タイム計算（実業団は学生より速め）
                              const avg = (athlete.stats.spd + athlete.stats.sta + athlete.stats.mnt) / 3;
                              const tierBonus = { S: 1.04, A: 1.02, B: 1.00, C: 0.98 }[athlete.proTeam?.tier] ?? 1.0;
                              const yr = athlete.proYear;
                              const careerFactor = yr <= 3 ? (1.0 + yr * 0.008) : yr <= 6 ? (1.024 - (yr-3)*0.003) : (1.015 - (yr-6)*0.012);
                              const cond = 0.94 + Math.random() * 0.10;
                              let basePace;
                              if (trackRaceEvent.type === "マラソン") basePace = 4.50 - (avg - 60) * 0.028;
                              else if (trackRaceEvent.type === "ハーフ") basePace = 4.00 - (avg - 60) * 0.024;

                              proResults.push({
                                player: { ...athlete, name: athlete.name, grade: null, id: athlete.id },
                                time, timeInSeconds: totalSec,
                                university: athlete.proTeam?.name ?? '実業団',
                                isMyTeam: false,
                                isPro: true,
                                proTeam: athlete.proTeam,
                                isPB
                              });
                            });
                            // proAthletesの記録を更新
                            if (proResults.length > 0) {
                              setProAthletes(prev => prev.map(a => {
                                const pr = proResults.find(r => r.player.id === a.id);
                                if (!pr) return a;
                                const existingRecs = a.proRecords?.[proRaceKey] || [];
                                const pb = existingRecs.reduce((b,r) => !b||r.timeInSeconds<b.timeInSeconds?r:b, null);
                                const isPB = !pb || pr.timeInSeconds < pb.timeInSeconds;
                                return { ...a, proRecords: { ...a.proRecords, [proRaceKey]: [...existingRecs, { time: pr.time, timeInSeconds: pr.timeInSeconds, year: currentCalendar.year, isPB }] } };
                              }));
                            }
                          }
                          // 全結果を統合してソート（実業団混入）
                          const allResults = [...myResults, ...rivalResults, ...proResults].sort((a, b) => a.timeInSeconds - b.timeInSeconds);
                          const results = myResults.sort((a, b) => a.timeInSeconds - b.timeInSeconds);
                          // シーズン定義：4月1週(week1) 〜 3月4週(week48) = 同一年度内
                          const currentYear = currentCalendar.year;
                          const seasonStartWeek = (currentYear - 2001) * 48 + 1;  // 4月1週
                          const seasonEndWeek   = (currentYear - 2001) * 48 + 48; // 3月4週
                          // 各選手の達成判定（自大学）
                          const myResultsWithAchievements = results.map(result => {
                            const achievements = [];
                            const player = result.player;
                            // --- PB判定：生涯最高タイム ---
                            const currentBest = player.records?.[trackRaceEvent.type];
                            if (!currentBest) {
                              achievements.push('PB');
                            } else {
                              const pbParts = currentBest.split(':').map(Number);
                              const pbSeconds = pbParts.length === 3
                                ? pbParts[0] * 3600 + pbParts[1] * 60 + pbParts[2]
                                : pbParts[0] * 60 + pbParts[1];
                              if (result.timeInSeconds < pbSeconds) {
                                achievements.push('PB');
                              }
                            }
                            // --- SB判定：同年度（4月1週〜3月4週）内の最高タイム ---
                            const inSeason = week >= seasonStartWeek && week <= seasonEndWeek;
                            if (inSeason) {
                              const seasonBest = player.seasonRecords?.[currentYear]?.[trackRaceEvent.type];
                              if (!seasonBest || result.timeInSeconds < seasonBest) {
                                achievements.push('SB');
                              }
                            }
                            return { ...result, achievements };
                          });
                          // 学内記録更新チェック（resultsが空でなければ）
                          let newSchoolRecord = false;
                          if (results.length > 0) {
                            const topTimeInSeconds = results[0].timeInSeconds;
                            const currentSchoolRecord = schoolRecords[trackRaceEvent.type];
                            if (!currentSchoolRecord || topTimeInSeconds < currentSchoolRecord.timeInSeconds) {
                              newSchoolRecord = true;
                              const topPlayer = results[0].player;
                              const topResult = myResultsWithAchievements.find(r => r.player.id === topPlayer.id);
                              if (topResult && !topResult.achievements.includes('学内記録更新')) {
                                topResult.achievements.push('学内記録更新');
                              }
                              setSchoolRecords({
                                ...schoolRecords,
                                [trackRaceEvent.type]: {
                                  time: results[0].time,
                                  timeInSeconds: topTimeInSeconds,
                                  playerName: topPlayer.name,
                                  year: currentCalendar.year,
                                  eventName: trackRaceEvent.name
                                }
                              });
                            }
                          }
                          // 選手の記録更新（自大学） - seasonRecordsも更新
                          // チーム内10kmは個人記録に反映しない
                          const newRecordsForHistory = []; // 歴代記録に追加するレコード
                          const updatedPlayers = players.map(p => {
                            const result = results.find(r => r.player.id === p.id);
                            if (result && trackRaceEvent.type !== "チーム内10km") {
                              const currentBest = p.records[trackRaceEvent.type];
                              let newBest = result.time;
                              let isNewRecord = false;
                              if (currentBest) {
                                // タイム形式に応じて秒に変換
                                const currentParts = currentBest.split(':').map(Number);
                                let currentSeconds;
                                if (currentParts.length === 3) {
                                  currentSeconds = currentParts[0] * 3600 + currentParts[1] * 60 + currentParts[2];
                                } else {
                                  currentSeconds = currentParts[0] * 60 + currentParts[1];
                                }
                                if (result.timeInSeconds >= currentSeconds) {
                                  newBest = currentBest;
                                } else {
                                  isNewRecord = true;
                                }
                              } else {
                                isNewRecord = true;
                              }
                              
                              // 自己ベスト更新時に歴代記録候補に追加
                              if (isNewRecord) {
                                newRecordsForHistory.push({
                                  name: p.name,
                                  university: universityName,
                                  grade: p.grade,
                                  time: result.time,
                                  timeInSeconds: result.timeInSeconds,
                                  year: currentCalendar.year,
                                  event: trackRaceEvent.name
                                });
                              }
                              
                              // シーズンベストも更新
                              const seasonRecords = p.seasonRecords || {};
                              const yearRecords = seasonRecords[currentYear] || {};
                              const currentSeasonBest = yearRecords[trackRaceEvent.type];
                              if (!currentSeasonBest || result.timeInSeconds < currentSeasonBest) {
                                yearRecords[trackRaceEvent.type] = result.timeInSeconds;
                                seasonRecords[currentYear] = yearRecords;
                              }
                              
                              // 🆕 疲労を追加（距離に応じて）
                              const distance = TRACK_EVENTS[trackRaceEvent.type].distance;
                              const fatigueToAdd = Math.ceil(distance / 5); // 5kmごとに1疲労
                              const newFatigue = Math.min(10, p.fatigue + fatigueToAdd);
                              
                              // 🆕 記録会での成長（距離に応じて）
                              const newStats = { ...p.stats };
                              const growthMult = GROWTH_TYPES[p.growthType][p.grade];
                              const bonus = (p.skill1 === "天才" || p.skill2 === "天才") ? 1.3 : 1.0;
                              
                              // 距離に応じた成長
                              if (trackRaceEvent.type === '5000m') {
                                // 5000m: スピード重視
                                newStats.spd = Math.min(100, newStats.spd + 0.15 * growthMult * bonus);
                                newStats.sta = Math.min(100, newStats.sta + 0.08 * growthMult * bonus);
                                newStats.mnt = Math.min(100, newStats.mnt + 0.10 * growthMult * bonus);
                              } else if (trackRaceEvent.type === '10000m') {
                                // 10000m: スタミナ重視
                                newStats.spd = Math.min(100, newStats.spd + 0.08 * growthMult * bonus);
                                newStats.sta = Math.min(100, newStats.sta + 0.15 * growthMult * bonus);
                                newStats.mnt = Math.min(100, newStats.mnt + 0.10 * growthMult * bonus);
                              } else if (trackRaceEvent.type === 'ハーフ') {
                                // ハーフ: メンタル重視
                                newStats.sta = Math.min(100, newStats.sta + 0.10 * growthMult * bonus);
                                newStats.mnt = Math.min(100, newStats.mnt + 0.15 * growthMult * bonus);
                                newStats.res = Math.min(100, newStats.res + 0.08 * growthMult * bonus);
                              } else if (trackRaceEvent.type === 'マラソン') {
                                // フルマラソン: 耐久力重視
                                newStats.sta = Math.min(100, newStats.sta + 0.12 * growthMult * bonus);
                                newStats.mnt = Math.min(100, newStats.mnt + 0.12 * growthMult * bonus);
                                newStats.res = Math.min(100, newStats.res + 0.15 * growthMult * bonus);
                              } else if (trackRaceEvent.type === 'チーム内10km') {
                                // チーム内: バランス
                                newStats.spd = Math.min(100, newStats.spd + 0.08 * growthMult * bonus);
                                newStats.sta = Math.min(100, newStats.sta + 0.10 * growthMult * bonus);
                                newStats.mnt = Math.min(100, newStats.mnt + 0.08 * growthMult * bonus);
                              }
                              
                              return {
                                ...p,
                                records: { ...p.records, [trackRaceEvent.type]: newBest },
                                seasonRecords: seasonRecords,
                                fatigue: newFatigue,
                                stats: newStats
                              };
                            } else {
                              // 🆕 記録会・駅伝に出ていない選手は疲労-3
                              return {
                                ...p,
                                fatigue: Math.max(0, p.fatigue - 3)
                              };
                            }
                          });
                          setPlayers(updatedPlayers);
                          
                          // 🆕 歴代記録を一括更新（全大学の上位記録を追加）
                          if (trackRaceEvent.type !== "チーム内10km") {
                            // ライバル＋実業団から上位50件を候補として追加
                            const rivalAndProResults = [...rivalResults, ...proResults]
                              .sort((a, b) => a.timeInSeconds - b.timeInSeconds)
                              .slice(0, 50);
                            const rivalTopResults = rivalAndProResults.map(result => ({
                              name: result.player.name,
                              university: result.university,
                              grade: result.player.grade,
                              time: result.time,
                              timeInSeconds: result.timeInSeconds,
                              year: currentCalendar.year,
                              event: trackRaceEvent.name
                            }));
                            // 自チーム選手は全員確実に追加（上位30件制限なし）
                            // updatedPlayersから最新recordを取得して反映
                            const myTeamResults = myResults.map(result => {
                              // updatedPlayersから更新後の記録を取得
                              const updatedPlayer = updatedPlayers.find(p => p.id === result.player.id);
                              const finalRecord = updatedPlayer?.records?.[trackRaceEvent.type];
                              const finalParts = finalRecord ? finalRecord.split(':').map(Number) : null;
                              const finalSeconds = finalParts ? (
                                finalParts.length === 3
                                  ? finalParts[0]*3600 + finalParts[1]*60 + finalParts[2]
                                  : finalParts[0]*60 + finalParts[1]
                              ) : result.timeInSeconds;
                              // PBタイム（最良値）を使用
                              const bestSeconds = Math.min(result.timeInSeconds, finalSeconds);
                              const bestTime = bestSeconds === result.timeInSeconds ? result.time : (finalRecord || result.time);
                              return {
                                name: result.player.name,
                                university: universityName,
                                grade: result.player.grade,
                                time: bestTime,
                                timeInSeconds: bestSeconds,
                                year: currentCalendar.year,
                                event: trackRaceEvent.name
                              };
                            });
                            // 全候補をマージ → 選手ごとに最良記録だけ残す → タイム順TOP50
                            const allCandidates = [...rivalTopResults, ...myTeamResults];
                            const bestByPlayer = {};
                            allCandidates.forEach(r => {
                              const key = `${r.name}_${r.university}`;
                              if (!bestByPlayer[key] || r.timeInSeconds < bestByPlayer[key].timeInSeconds) {
                                bestByPlayer[key] = r;
                              }
                            });
                            const newEntries = Object.values(bestByPlayer);
                            setAllTimeRecords(prev => {
                              const currentRecords = prev[trackRaceEvent.type] || [];
                              const merged = [...currentRecords, ...newEntries];
                              const best = {};
                              merged.forEach(r => {
                                const key = `${r.name}_${r.university}`;
                                if (!best[key] || r.timeInSeconds < best[key].timeInSeconds) {
                                  best[key] = r;
                                }
                              });
                              const updated = Object.values(best)
                                .sort((a, b) => a.timeInSeconds - b.timeInSeconds)
                                .slice(0, 50);
                              return { ...prev, [trackRaceEvent.type]: updated };
                            });
                          }
                          
                          // 選手の記録更新（他大学） - チーム内10kmは記録に反映しない
                          const updatedRivalUniversities = rivalUniversities.map(univ => {
                            return {
                              ...univ,
                              players: univ.players.map(p => {
                                const result = rivalResults.find(r => r.player.id === p.id);
                                if (result && trackRaceEvent.type !== "チーム内10km") {
                                  const currentBest = p.records[trackRaceEvent.type];
                                  let newBest = result.time;
                                  if (currentBest) {
                                    const [min, sec] = currentBest.split(':').map(Number);
                                    const currentSeconds = min * 60 + sec;
                                    if (result.timeInSeconds >= currentSeconds) {
                                      newBest = currentBest;
                                    }
                                  }
                                  return {
                                    ...p,
                                    records: { ...p.records, [trackRaceEvent.type]: newBest }
                                  };
                                }
                                return p;
                              })
                            };
                          });
                          setRivalUniversities(updatedRivalUniversities);
                          // 大会記録・日本記録の更新（チーム内10kmは除外）
                          let newMeetRecord = false;
                          let newNationalRecord = false;
                          const fastestResult = allResults[0];
                          let updatedMeetRecord = null;
                          let updatedNationalRecord = null;
                          if (trackRaceEvent.type !== "チーム内10km" && fastestResult) {
                            // ⑦修正: 大会記録更新チェック（閉じ括弧修正済み）
                            const currentMeetRecord = meetRecords[trackRaceEvent.name];
                            if (!currentMeetRecord || fastestResult.timeInSeconds < currentMeetRecord.timeInSeconds) {
                              newMeetRecord = true;
                              if (fastestResult.isMyTeam) {
                                const recordHolder = myResultsWithAchievements.find(r => r.player.id === fastestResult.player.id);
                                if (recordHolder && !recordHolder.achievements.includes('大会記録更新')) {
                                  recordHolder.achievements.push('大会記録更新');
                                }
                              }
                              updatedMeetRecord = {
                                time: fastestResult.time,
                                timeInSeconds: fastestResult.timeInSeconds,
                                playerName: fastestResult.player.name,
                                university: fastestResult.university,
                                year: currentCalendar.year,
                                eventName: trackRaceEvent.name
                              };
                              setMeetRecords(prev => ({ ...prev, [trackRaceEvent.name]: updatedMeetRecord }));
                            } else {
                              updatedMeetRecord = currentMeetRecord;
                            }
                            // ⑦修正: 日本記録更新チェック
                            const currentNationalRecord = nationalRecords[trackRaceEvent.type];
                            if (!currentNationalRecord || fastestResult.timeInSeconds < currentNationalRecord.timeInSeconds) {
                              newNationalRecord = true;
                              if (fastestResult.isMyTeam) {
                                const recordHolder = myResultsWithAchievements.find(r => r.player.id === fastestResult.player.id);
                                if (recordHolder && !recordHolder.achievements.includes('日本記録更新')) {
                                  recordHolder.achievements.push('日本記録更新');
                                }
                              }
                              updatedNationalRecord = {
                                time: fastestResult.time,
                                timeInSeconds: fastestResult.timeInSeconds,
                                playerName: fastestResult.player.name,
                                university: fastestResult.university,
                                year: currentCalendar.year
                              };
                              setNationalRecords(prev => ({ ...prev, [trackRaceEvent.type]: updatedNationalRecord }));
                            } else {
                              updatedNationalRecord = currentNationalRecord;
                            }
                          }
                          // 【評判変動】自チーム選手が記録を更新した場合
                          if (trackRaceEvent.type !== "チーム内10km") {
                            if (newNationalRecord && fastestResult?.isMyTeam) {
                              setReputation(prev => Math.min(100, prev + 8));
                            } else if (newMeetRecord && fastestResult?.isMyTeam) {
                              setReputation(prev => Math.min(100, prev + 3));
                            }
                          }
                          setTrackRaceResults({ 
                            allResults, 
                            myResults: myResultsWithAchievements, 
                            newSchoolRecord,
                            newMeetRecord: trackRaceEvent.type !== "チーム内10km" ? newMeetRecord : false,
                            newNationalRecord: trackRaceEvent.type !== "チーム内10km" ? newNationalRecord : false,
                            weather, 
                            temperature,
                            meetRecord: updatedMeetRecord,
                            nationalRecord: updatedNationalRecord,
                            schoolRecord: schoolRecords[trackRaceEvent.type]
                          });
                        }}
                        className="flex-1 py-3 rounded-xl font-black bg-gradient-to-r from-green-600 to-emerald-600 text-white hover:scale-105 transition-all"
                      >
                        {selectedRunners.length === 0 ? '棄権する' : 'レース開始'}
                      </button>
                    </div>
                  </>
                  )
                ) : (
                  // レース結果画面
                  <>
                    <div className="text-center mb-6">
                      <h2 className="text-2xl font-black text-yellow-400 mb-2">🏆 {trackRaceEvent.name} 結果</h2>
                      <p className="text-xs text-slate-400">天気: {trackRaceResults.weather} / 気温: {trackRaceResults.temperature}</p>
                    </div>

                    <div className="grid grid-cols-3 gap-2 mb-4">

                        {trackRaceResults.meetRecord && (
                          <p className="text-[9px] text-slate-400 mt-1">
                            {trackRaceResults.meetRecord.university} {trackRaceResults.meetRecord.year}年<br/>
                            {trackRaceResults.meetRecord.playerName} {trackRaceResults.meetRecord.eventName}
                          </p>
                        )}
                      </div>
                      <div className="bg-gradient-to-br from-red-600/20 to-red-800/20 border border-red-500/30 rounded-lg p-3">
                        <p className="text-[10px] text-red-400 font-black mb-1">🇯🇵 日本記録</p>
                        <p className="text-xs text-white font-bold">{trackRaceResults.nationalRecord?.time || '-'}</p>
                        {trackRaceResults.nationalRecord && (
                          <p className="text-[9px] text-slate-400 mt-1">
                            {trackRaceResults.nationalRecord.university} {trackRaceResults.nationalRecord.year}年<br/>
                            {trackRaceResults.nationalRecord.playerName}
                          </p>
                        )}
                      </div>
                      <div className="bg-gradient-to-br from-blue-600/20 to-blue-800/20 border border-blue-500/30 rounded-lg p-3">
                        <p className="text-[10px] text-blue-400 font-black mb-1">🎓 学内記録</p>
                        <p className="text-xs text-white font-bold">{trackRaceResults.schoolRecord?.time || '-'}</p>
                        {trackRaceResults.schoolRecord && (
                          <p className="text-[9px] text-slate-400 mt-1">
                            {trackRaceResults.schoolRecord.year}年<br/>
                            {trackRaceResults.schoolRecord.playerName}
                          </p>
                        )}
                      </div>
                    </div>
                    {/* 記録更新の通知 */}
                    {(trackRaceResults.newNationalRecord || trackRaceResults.newMeetRecord || trackRaceResults.newSchoolRecord) && (
                      <div className="mb-4 space-y-2">
                        {trackRaceResults.newNationalRecord && (
                          <div className="p-3 bg-gradient-to-r from-red-600/20 to-red-800/20 border border-red-500/50 rounded-lg">
                            <p className="text-center text-sm font-black text-red-300">🇯🇵 日本記録更新！ 🇯🇵</p>
                          </div>

                        {trackRaceResults.newMeetRecord && (
                          <div className="p-3 bg-gradient-to-r from-amber-600/20 to-amber-800/20 border border-amber-500/50 rounded-lg">
                            <p className="text-center text-sm font-black text-amber-300">🏆 大会記録更新！ 🏆</p>
                          </div>

                        {trackRaceResults.newSchoolRecord && (

                            <p className="text-center text-sm font-black text-blue-300">🎓 学内記録更新！ 🎓</p>

                    <div className="space-y-4 mb-6">

                      const members = gakurenTeam.slice(0, n); // 最大10人
                      if (members.length === 0) return <p className="text-slate-500 text-xs">メンバーなし</p>;

                      const fitnessMatrix = members.map(m => {
                        const fit = calculateSectionFitness(m.player, "箱根");
                        return sections.map((_, si) => fit[si + 1] || 0);
                      });

                      // 貪欲法（適性差大の区間を優先）
                      const assignment = Array(n).fill(-1);
                      const usedP = new Set();
                      const sectionPriority = sections.map((_, si) => {
                        const scores = members.map((_, pi) => fitnessMatrix[pi][si]);
                        scores.sort((a, b) => b - a);
                        return { si, spread: (scores[0] || 0) - (scores[1] || 0) };
                      }).sort((a, b) => b.spread - a.spread);
                      sectionPriority.forEach(({ si }) => {
                        if (si >= members.length) return;
                        let best = -1, bestScore = -1;
                        members.forEach((_, pi) => {
                          if (usedP.has(pi)) return;
                          if (fitnessMatrix[pi][si] > bestScore) { bestScore = fitnessMatrix[pi][si]; best = pi; }
                        });
                        if (best !== -1) { assignment[si] = best; usedP.add(best); }
                      });

                        improved = false;
                        for (let i = 0; i < n; i++) {
                          for (let j = i + 1; j < n; j++) {
                            const pi = assignment[i], pj = assignment[j];
                            if (pi === -1 || pj === -1) continue;
                            const before = fitnessMatrix[pi][i] + fitnessMatrix[pj][j];
                            const after  = fitnessMatrix[pj][i] + fitnessMatrix[pi][j];
                            if (after > before) { assignment[i] = pj; assignment[j] = pi; improved = true; }
                          }

                            <span className="font-mono text-yellow-400 text-[9px] shrink-0">{tMin}:{tSec.toString().padStart(2,'0')}</span>

          className={`flex flex-col items-center gap-1 transition-all ${active ? 'text-blue-400' : 'text-slate-600 hover:text-slate-400'}`}
        >
          <div className={`w-10 h-10 rounded-xl flex items-center justify-center transition-all ${active ? 'bg-blue-600/20' : ''}`}>
            <Icon name={icon} size={20} />
          </div>
          <span className="text-[7px] font-black tracking-tighter uppercase">{label}</span>
        </button>
      );
    }
    // エラーバウンダリー
    class ErrorBoundary extends React.Component {
      constructor(props) {
        super(props);
        this.state = { hasError: false, error: null, errorInfo: null };
      }
      static getDerivedStateFromError(error) {
        return { hasError: true };
      }
      componentDidCatch(error, errorInfo) {
        this.setState({ error, errorInfo });
        console.error('Error caught by boundary:', error, errorInfo);
      }
      render() {
        if (this.state.hasError) {
          return (
            <div style={{
              padding: '20px',
              backgroundColor: '#1e293b',
              color: 'white',
              minHeight: '100vh',
              fontFamily: 'monospace'
            }}>
              <h1 style={{ color: '#ef4444', marginBottom: '20px' }}>エラーが発生しました</h1>
              <div style={{ backgroundColor: '#0f172a', padding: '15px', borderRadius: '8px', marginBottom: '20px' }}>
                <p style={{ color: '#f87171', marginBottom: '10px' }}>
                  <strong>エラー:</strong> {this.state.error && this.state.error.toString()}
                </p>
                <pre style={{ color: '#94a3b8', fontSize: '12px', overflow: 'auto' }}>
                  {this.state.errorInfo && this.state.errorInfo.componentStack}
                </pre>
              </div>
              <button 
                onClick={() => window.location.reload()}
                style={{
                  padding: '10px 20px',
                  backgroundColor: '#3b82f6',
                  color: 'white',
                  border: 'none',
                  borderRadius: '8px',
                  cursor: 'pointer',
                  fontWeight: 'bold'
                }}
              >
                リロードして再起動
              </button>
            </div>
          );
        }
        return this.props.children;
      }
    }
    // グローバルエラーハンドラー
    window.onerror = function(message, source, lineno, colno, error) {
      alert(`グローバルエラー発生:\n${message}\n\n行: ${lineno}, 列: ${colno}\n\nファイル: ${source}`);
      return true;
    };
    window.onunhandledrejection = function(event) {
      alert(`Promise エラー:\n${event.reason}`);
    };
    // レンダリング
    ReactDOM.render(
      <ErrorBoundary>
        <EkidenKingEvolution />
      </ErrorBoundary>,
      document.getElementById('root')
    );
  </script>
</body>
</html>
